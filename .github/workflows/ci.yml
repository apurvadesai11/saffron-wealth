name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, build, unit, e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux lightningcss native binary
        if: runner.os == 'Linux'
        run: |
          VERSION=$(node -e "console.log(require('./node_modules/lightningcss/package.json').version)")
          echo "lightningcss version: $VERSION"
          npm install --no-save "lightningcss-linux-x64-gnu@$VERSION"
          echo "--- package contents ---"
          ls node_modules/lightningcss-linux-x64-gnu/ 2>&1 || echo "NOT FOUND"
          echo "--- test require ---"
          node -e "try { require('lightningcss-linux-x64-gnu'); console.log('OK'); } catch(e) { console.error('FAIL:', e.message); process.exit(1); }"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
